services:
  # ============================================================================
  # MQTT Broker - Mosquitto
  # ============================================================================
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: mqtt-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"        # ✅ MQTT - EXPONIERT für Messgeräte & externe Systeme
    volumes:
      - /volume1/docker/mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - mqtt-network
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "check", "-q", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: mqtt-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=mqtt-energy-cluster
      - node.name=mqtt-es-node-1
    expose:
      - "9200"  # Nur für Container-zu-Container Kommunikation
      - "9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - mqtt-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536    



#Network
networks:
  mqtt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

#Volumes
volumes:
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local
  elasticsearch-data:
    driver: local
  kibana-data:
    driver: local
  grafana-data:
    driver: local
  scheduler-logs:
    driver: local
  publisher-logs:
    driver: local